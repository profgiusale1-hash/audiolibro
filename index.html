<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Video Player con Memoria</title>
    <style>
        body { display: flex; font-family: sans-serif; margin: 0; height: 100vh; background: #111; color: white; }
        #sidebar { width: 280px; background: #222; border-right: 1px solid #444; display: flex; flex-direction: column; }
        #playlist { flex: 1; overflow-y: auto; padding: 10px; }
        #player-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        
        .video-btn { 
            width: 100%; padding: 12px; margin-bottom: 8px; background: #333; color: white; 
            border: none; border-radius: 5px; cursor: pointer; text-align: left; transition: 0.2s;
        }
        .video-btn:hover { background: #ff0000; }
        
        /* Contenitore per il video */
        #video-placeholder { width: 90%; height: 80%; background: #111; border: 2px solid #333; }
        .info { padding: 10px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid #444;">
            <h3 style="margin:0">I MIEI VIDEO</h3>
            <small>Caricati da Google Sheets</small>
        </div>
        <div id="playlist">Caricamento lista...</div>
    </div>

    <div id="player-area">
        <div id="video-placeholder"></div>
        <div id="status" class="info">Seleziona un video per iniziare</div>
    </div>

    <!-- Script fondamentale di YouTube -->
    <script src="https://www.youtube.com/iframe_api"></script>

<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTuWBs6QFmSfRyrmxdioOjXtOLAY7k9YPIItpuEUDmsidqzfLldzsFlBQ7rdEKUJNfzkqnjQynKKUcs/pub?output=csv";
    
    let player;
    let currentVideoId = "";

    // 1. Carica i dati dal tuo foglio Google
    fetch(SHEET_URL)
        .then(response => response.text())
        .then(csvText => {
            const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
            const container = document.getElementById("playlist");
            container.innerHTML = "";

            lines.forEach((line, index) => {
                const id = extractId(line);
                if (id) {
                    const btn = document.createElement("button");
                    btn.className = "video-btn";
                    btn.innerText = "▶ Video " + (index + 1);
                    btn.onclick = () => startVideo(id);
                    container.appendChild(btn);
                }
            });
        })
        .catch(err => {
            document.getElementById("playlist").innerHTML = "Errore caricamento foglio.";
        });

    function extractId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    // 2. Questa funzione avvia il video e recupera il tempo salvato
    function startVideo(id) {
        currentVideoId = id;
        
        // Recupera il secondo salvato nel browser per questo video specifico
        const savedTime = localStorage.getItem("time_" + id) || 0;
        
        if (player) {
            player.loadVideoById({
                videoId: id,
                startSeconds: parseFloat(savedTime)
            });
        } else {
            // Crea il player se non esiste ancora
            player = new YT.Player('video-placeholder', {
                videoId: id,
                playerVars: { 'autoplay': 1, 'start': Math.floor(savedTime) },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }
        document.getElementById("status").innerText = "Video: " + id + " - Ripreso da: " + Math.floor(savedTime) + "s";
    }

    // 3. Salva la posizione ogni 3 secondi mentre il video va
    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            setInterval(() => {
                if (player && player.getCurrentTime) {
                    const currentTime = player.getCurrentTime();
                    localStorage.setItem("time_" + currentVideoId, currentTime);
                }
            }, 3000); // Salva ogni 3 secondi
        }
    }
</script>

</body>
</html>
