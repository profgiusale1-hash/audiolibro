<!DOCTYPE html>
<html>
<head>
    <title>Video Player con Memoria</title>
    <style>
        body { display: flex; font-family: sans-serif; margin: 0; height: 100vh; background: #000; color: white; }
        #lista { width: 250px; background: #1a1a1a; overflow-y: auto; padding: 15px; border-right: 1px solid #333; }
        #player { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-video { 
            display: block; width: 100%; padding: 12px; margin-bottom: 8px; 
            background: #333; color: white; border: none; cursor: pointer; border-radius: 4px;
        }
        .btn-video:hover { background: #ff0000; }
        /* Il contenitore del video deve essere preciso per YouTube */
        #video-frame { width: 90%; height: 80%; border: none; }
    </style>
</head>
<body>

    <div id="lista">
        <h3>I MIEI VIDEO</h3>
        <div id="bottoni">Caricamento...</div>
    </div>

    <div id="player">
        <!-- Usiamo l'API di YouTube per controllare il tempo -->
        <div id="youtube-player"></div>
        <p id="stato" style="color: #888; margin-top: 10px;">Seleziona un video</p>
    </div>

    <!-- Carichiamo la libreria ufficiale di YouTube per gestire il tempo -->
    <script src="https://www.youtube.com/iframe_api"></script>

<script>
    const linkFoglio = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTuWBs6QFmSfRyrmxdioOjXtOLAY7k9YPIItpuEUDmsidqzfLldzsFlBQ7rdEKUJNfzkqnjQynKKUcs/pub?output=csv";
    let player; 
    let ultimoVideoId = "";

    // 1. Leggi il foglio Google
    fetch(linkFoglio)
        .then(res => res.text())
        .then(testo => {
            const righe = testo.split("\n");
            const contenitore = document.getElementById("bottoni");
            contenitore.innerHTML = "";

            righe.forEach((riga, i) => {
                // Estrae l'ID video (la parte dopo v=)
                const id = riga.includes("v=") ? riga.split("v=")[1].split("&")[0] : riga.split("/").pop().trim();
                
                if(id.length > 5) {
                    let btn = document.createElement("button");
                    btn.className = "btn-video";
                    btn.innerText = "Video " + (i + 1);
                    btn.onclick = () => caricaVideo(id.trim());
                    contenitore.appendChild(btn);
                }
            });
        });

    // 2. Funzione per caricare il video e cercare il tempo salvato
    function caricaVideo(id) {
        ultimoVideoId = id;
        // Controlla se c'è un tempo salvato per questo specifico video
        const tempoSalvato = localStorage.getItem("tempo_" + id) || 0;
        
        if (player) { player.destroy(); } // Pulisce il player precedente

        player = new YT.Player('youtube-player', {
            height: '80%',
            width: '90%',
            videoId: id,
            playerVars: { 'start': Math.floor(tempoSalvato), 'autoplay': 1 },
            events: { 'onStateChange': monitoraTempo }
        });
        
        document.getElementById("stato").innerText = "Riproduzione: " + id + (tempoSalvato > 0 ? " (Ripreso da " + Math.floor(tempoSalvato) + "s)" : "");
    }

    // 3. Salva il tempo ogni secondo mentre guardi
    function monitoraTempo(event) {
        // Se il video è in riproduzione (1) o in pausa (2)
        setInterval(() => {
            if (player && player.getCurrentTime) {
                const tempoAttuale = player.getCurrentTime();
                if (tempoAttuale > 0) {
                    localStorage.setItem("tempo_" + ultimoVideoId, tempoAttuale);
                }
            }
        }, 2000); // Salva ogni 2 secondi
    }
</script>

</body>
</html>
